name: Build unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned iOS IPA
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install xcodegen (fallback)
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen || true
          fi

      - name: Generate Xcode project (if xcodegen.yml exists)
        run: |
          if [ -f "project.yml" ] || [ -f "project.yaml" ]; then
            xcodegen generate
          fi

      - name: Resolve package dependencies
        working-directory: LiquidGlassSpeedometer
        run: |
          xcodebuild \
            -project LiquidGlassSpeedometer.xcodeproj \
            -scheme LiquidGlassSpeedometer \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            resolvePackageDependencies || true

      - name: Build app (unsigned)
        working-directory: LiquidGlassSpeedometer
        run: |
          xcodebuild \
            -project LiquidGlassSpeedometer.xcodeproj \
            -scheme LiquidGlassSpeedometer \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            build | xcpretty || xcodebuild \
            -project LiquidGlassSpeedometer.xcodeproj \
            -scheme LiquidGlassSpeedometer \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package into IPA
        run: |
          APP_PATH="LiquidGlassSpeedometer/build/Build/Products/Release-iphoneos/LiquidGlassSpeedometer.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r LiquidGlassSpeedometer-unsigned.ipa Payload
          ls -lh LiquidGlassSpeedometer-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiquidGlassSpeedometer-unsigned-ipa
          path: LiquidGlassSpeedometer-unsigned.ipa
          retention-days: 30
