name: Build unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned iOS IPA
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Build (unsigned)
        working-directory: LiquidGlassSpeedometer
        run: |
          xcodebuild \
            -project LiquidGlassSpeedometer.xcodeproj \
            -scheme LiquidGlassSpeedometer \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package into IPA
        run: |
          APP_DIR="${GITHUB_WORKSPACE}/LiquidGlassSpeedometer/build/Build/Products/Release-iphoneos"
          echo "Looking for .app in ${APP_DIR}"
          ls -la "${APP_DIR}" || (echo "Release-iphoneos dir not found"; exit 1)
          APP_PATH="$(find "${APP_DIR}" -name "*.app" -type d -maxdepth 1 | head -n 1)"
          echo "Found app: ${APP_PATH}"
          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          zip -r LiquidGlassSpeedometer-unsigned.ipa Payload
          ls -lh LiquidGlassSpeedometer-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiquidGlassSpeedometer-unsigned-ipa
          path: LiquidGlassSpeedometer-unsigned.ipa
          retention-days: 30
